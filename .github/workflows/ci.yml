name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev
          sudo apt-get install -y curl tar

      - name: Install Vulkan SDK (1.3.275.0)
        run: |
          curl -L -J -O https://sdk.lunarg.com/sdk/download/1.3.275.0/linux/vulkan-sdk-1.3.275.0.tar.gz
          mkdir -p $HOME/vulkan-sdk
          tar -xzf vulkan-sdk-1.3.275.0.tar.gz -C $HOME/vulkan-sdk --strip-components=1
          echo "VULKAN_SDK=$HOME/vulkan-sdk/x86_64" >> $GITHUB_ENV
          echo "$HOME/vulkan-sdk/x86_64/bin" >> $GITHUB_PATH
          echo "VK_ICD_FILENAMES=$HOME/vulkan-sdk/x86_64/etc/vulkan/icd.d" >> $GITHUB_ENV
          echo "VK_LAYER_PATH=$HOME/vulkan-sdk/x86_64/etc/vulkan/explicit_layer.d" >> $GITHUB_ENV

      - name: Cache build files
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Install cloc for line count
        run: sudo apt-get install -y cloc

      - name: Count lines of code
        run: cloc .